name: Build and deploy the docker images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-run-images:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build images
        run: docker-compose build
      - name: Run new containers
        run: docker-compose up -d --force-recreate
