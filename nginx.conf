server {
  listen 80;
  server_name web.duckling.co; # Replace with your domain name
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;

  server_name web.duckling.co; # Replace with your domain name

  ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem; # Match the mounted path
  ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key; # Match the mounted pathsure this path matches where the key will be within the Docker container

  # Strong SSL settings
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256...'; # Add your preferred ciphers
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_tickets off;

  location / {
    proxy_pass http://duckling-nuxt:3000; # Proxy pass to the Nuxt.js application
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_cache_bypass $http_upgrade;
  }
}